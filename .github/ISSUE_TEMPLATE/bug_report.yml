name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Install ServerDoctor
        2. Start server
        3. Run command ...
        4. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: server_version
    attributes:
      label: Minecraft / Paper Version
      placeholder: "1.21.8"

  - type: input
    id: plugin_version
    attributes:
      label: ServerDoctor Version
      placeholder: "0.1.0"

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste stack traces or console output.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context