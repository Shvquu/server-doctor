# ServerDoctor configuration
# Read-only Analyse-Plattform - diese Datei verändert nichts am Server.

# ---- Security advisory feed (off by default) -------------------------------
# There is no canonical CVE database for Minecraft plugins, so this checks
# installed plugins against a REAL, external feed that you (or the community)
# maintain. Disabled and empty by default -> behaves exactly as before.
security:
  advisory:
    enabled: false
    # HTTPS URL of a feed in the documented pipe format (see advisories.sample.txt).
    # e.g. https://raw.githubusercontent.com/<org>/<repo>/main/advisories.txt
    feed-url: ""
    refresh-minutes: 360

storage:
  # Aktives Backend. Eines von: memory | sqlite | postgresql | mariadb | mongodb
  type: sqlite

  # ---- Dateibasiert (keine Zugangsdaten) ------------------------------------
  sqlite:
    # Relativ zum Plugin-Datenordner oder absoluter Pfad.
    file: "serverdoctor.db"

  # ---- PostgreSQL -----------------------------------------------------------
  postgresql:
    host: "localhost"
    port: 5432
    database: "serverdoctor"
    username: "serverdoctor"
    password: "changeme"
    # Optionale JDBC-Properties (werden als ?k=v an die URL gehängt).
    properties:
      sslmode: "disable"

  # ---- MariaDB / MySQL ------------------------------------------------------
  mariadb:
    host: "localhost"
    port: 3306
    database: "serverdoctor"
    username: "serverdoctor"
    password: "changeme"
    properties:
      useSSL: "false"
      allowPublicKeyRetrieval: "true"

  # ---- MongoDB --------------------------------------------------------------
  mongodb:
    # Wenn gesetzt, hat dies Vorrang vor den Einzelfeldern darunter.
    # z. B. "mongodb+srv://user:pass@cluster0.example.mongodb.net/serverdoctor"
    connection-string: ""
    host: "localhost"
    port: 27017
    database: "serverdoctor"
    username: "serverdoctor"
    password: "changeme"
    # Datenbank, gegen die authentifiziert wird (oft "admin").
    auth-database: "admin"

# ---- REST API (read-only HTTP/JSON) ----------------------------------------
rest-api:
  enabled: false
  # Bind address. Keep 127.0.0.1 for localhost-only. If you expose it on
  # 0.0.0.0, set a token below and/or put it behind a reverse proxy.
  host: "127.0.0.1"
  port: 9173
  # Optional bearer token. If set, every endpoint except /health requires
  # the header: Authorization: Bearer <token>
  token: ""

# ---- Webhooks (Discord / Slack / Teams) ------------------------------------
webhooks:
  enabled: false
  # Notify only when the overall status reaches this severity or higher.
  # One of: INFO | LOW | MEDIUM | HIGH | CRITICAL
  min-severity: HIGH
  # Fires on status change (new/worse/recovered), not on every scan.
  targets:
    - type: discord
      name: "ops"
      url: ""
    - type: slack
      name: ""
      url: ""
    - type: teams
      name: ""
      url: ""